<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Shop</title>
  <meta http-equiv="refresh" content="3; url=./onlineshop/online.html" />
  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: linear-gradient(135deg, #0f0f0f, #3b2f10);
      color: #f8e7b5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      background: rgba(20, 20, 20, 0.95);
      border-radius: 24px;
      padding: 32px 36px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      max-width: 480px;
      width: 100%;
    }

    h1 {
      margin: 0 0 12px;
      color: #ffd54f;
      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
      font-size: 2rem;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: #f8e7b5;
    }

    a {
      display: inline-block;
      background: #ffd54f;
      color: #1b1406;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to the Online Shop</h1>
    <p>You are being redirected to the storefront.</p>
    <a href="./onlineshop/online.html">Open the shop now</a>
  </div>
</body>
</html>
