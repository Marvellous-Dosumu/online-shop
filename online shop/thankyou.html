<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: linear-gradient(135deg, #0f0f0f, #3b2f10);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #f8e7b5;
    }

    .thankyou-card {
      background: rgba(20, 20, 20, 0.95);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      border: 1px solid #8a6a1f;
    }

    .thankyou-card h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      color: #ffd54f;
      font-family: 'Brush Script MT', 'Lucida Handwriting', cursive;
    }

    .thankyou-card p {
      margin: 0 0 20px;
      font-size: 1rem;
      line-height: 1.6;
      color: #f8e7b5;
    }

    .thankyou-card a {
      display: inline-block;
      text-decoration: none;
      background: #ffd54f;
      color: #1b1406;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .thankyou-card a:hover {
      background: #ffca28;
    }
  </style>
</head>
<body>
  <div class="thankyou-card">
    <h1>Thank You!</h1>
    <p>Your order has been placed successfully. We appreciate your support and will be in touch soon.</p>

    <a href="onlineshop/online.html">Back to Shop</a>
  </div>
</body>
</html>
