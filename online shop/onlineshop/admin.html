<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="online.css" />
</head>
<body class="admin-page">
  <!-- Page navigation -->
  <header>
    <nav class="navbar">
      <a class="navbar-brand" href="online.html">Online Shop</a>
      <div class="nav-links">
        <a href="online.html">Home</a>
        <a href="online.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
      </div>
    </nav>
  </header>

  <!-- Admin dashboard content -->
  <div class="admin-card">
    <section class="page-header">
      <h1>Admin User Spreadsheet</h1>
      <p>Review logged-in users, guests, and visitor activity.</p>
    </section>

    <div class="admin-stats">
      <div class="stat-card">
        <span class="stat-label">Logged-in Users</span>
        <strong id="logged-in-count">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Guests</span>
        <strong id="guest-count">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total Visitors</span>
        <strong id="total-visitors">0</strong>
      </div>
    </div>

    <table class="admin-table" id="admin-table">
      <tr><td class="admin-empty" colspan="6">Loading visitor data...</td></tr>
    </table>
  </div>

  <script src="store-app.js"></script>
</body>
</html>
